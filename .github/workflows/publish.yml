name: docker_publish

on:
  push:
    branches:
    - '*'
    tags:
    - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Liquidator Service
  docker_liquidator_indexer:
    uses: babylonlabs-io/.github/.github/workflows/reusable_docker_pipeline.yml@5d014a155c08d56a1b5673d049f2b4e7d4427825 # v0.19.0 https://github.com/babylonlabs-io/.github/releases/tag/v0.19.0
    secrets: inherit
    with:
      publish: true
      dockerfile: ./docker/liquidator-ponder.Dockerfile
      repoName: liquidation-aave-indexer
      push_to_dockerhub: false
      hadolint_nofail: true
      trivy_nofail: true
    permissions:
      contents: read
      id-token: write
      security-events: write
      packages: read

  docker_liquidator_client:
    uses: babylonlabs-io/.github/.github/workflows/reusable_docker_pipeline.yml@5d014a155c08d56a1b5673d049f2b4e7d4427825 # v0.19.0 https://github.com/babylonlabs-io/.github/releases/tag/v0.19.0
    secrets: inherit
    with:
      publish: true
      dockerfile: ./docker/liquidator-client.Dockerfile
      repoName: liquidation-aave-client
      push_to_dockerhub: false
      hadolint_nofail: true
      trivy_nofail: true
    permissions:
      contents: read
      id-token: write
      security-events: write
      packages: read

  # Arbitrageur Service
  docker_arbitrageur_indexer:
    uses: babylonlabs-io/.github/.github/workflows/reusable_docker_pipeline.yml@5d014a155c08d56a1b5673d049f2b4e7d4427825 # v0.19.0 https://github.com/babylonlabs-io/.github/releases/tag/v0.19.0
    secrets: inherit
    with:
      publish: true
      dockerfile: ./docker/arbitrageur-ponder.Dockerfile
      repoName: arbitrageur-aave-indexer
      push_to_dockerhub: false
      hadolint_nofail: true
      trivy_nofail: true
    permissions:
      contents: read
      id-token: write
      security-events: write
      packages: read

  docker_arbitrageur_client:
    uses: babylonlabs-io/.github/.github/workflows/reusable_docker_pipeline.yml@5d014a155c08d56a1b5673d049f2b4e7d4427825 # v0.19.0 https://github.com/babylonlabs-io/.github/releases/tag/v0.19.0
    secrets: inherit
    with:
      publish: true
      dockerfile: ./docker/arbitrageur-client.Dockerfile
      repoName: arbitrageur-aave-client
      push_to_dockerhub: false
      hadolint_nofail: true
      trivy_nofail: true
    permissions:
      contents: read
      id-token: write
      security-events: write
      packages: read
